{% load i18n %}

<div class="card border-0 bg-light py-5 text-center">
    <div class="card-body">
        <div class="display-1 text-muted opacity-25 mb-3">
            <i class="bi bi-clipboard2"></i>
        </div>
        <h4 class="text-muted">{% trans "No tasks found" %}</h4>
        <p class="text-muted small">{% trans "Try adjusting filters or create a new task" %}</p>
        {% if request.GET|length > 0 %}
            <a href="{% url 'tasks:tasks-list' %}" class="btn btn-outline-secondary mt-2">
                {% trans "Reset filters" %}
            </a>
        {% else %}
            <a href="{% url 'tasks:task-create' %}" class="btn btn-primary mt-2">
                {% trans "Create Task" %}
            </a>
        {% endif %}
    </div>
</div>
