{% extends "base.html" %}
{% load django_bootstrap5 %}
{% bootstrap_messages %}
{% load i18n %}

{% block content %}
<div class="container py-3 py-lg-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">

            <h1 class="h3 mb-4 fw-bold">{% trans "Join Team" %}</h1>

            <form method="post" class="h-100 d-flex flex-column">
                {% csrf_token %}

                <div class="card shadow border-0 mb-4">
                    <div class="card-body p-3 p-md-4">
                        {% bootstrap_field form.name %}
                        {% bootstrap_field form.password %}
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex align-items-md-center justify-content-md-between mb-5">
                    <div class="d-grid gap-2 d-md-flex">
                        <button type="submit" class="btn btn-primary px-md-4 py-2 fw-bold">
                            {% trans "Join" %}
                        </button>
                        <a class="btn btn-outline-secondary px-md-4 py-2" href="{% url 'index' %}">
                            {% trans "Cancel" %}
                        </a>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<style>
    input[name="name"],
    input[name="password"] {
        font-weight: 700;
        font-size: 1.25rem;
        padding: 0.75rem;
    }

    input[name="name"]::placeholder,
    input[name="password"]::placeholder {
        font-size: 0.9rem;
        font-weight: 400;
        opacity: 0.7;
    }

    label.form-label {
        color: var(--tm-text-muted);
        font-size: 0.85rem;
        margin-bottom: 0.2rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    label.required::after {
        content: " *";
        color: #dc3545;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add required indicator to required fields
    const requiredFields = ['name', 'password'];
    requiredFields.forEach(function(fieldName) {
        const field = document.querySelector(`label[for="id_${fieldName}"]`);
        if (field) {
            field.classList.add('required');
        }
    });
});
</script>
{% endblock %}
